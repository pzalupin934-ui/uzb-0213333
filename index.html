<style>
:root{
  --bg-dark:#0b0f1a;
  --bg-mid:#111827;
  --stroke:rgba(255,255,255,0.15);
  --neon:#22f7d0;
  --purple:#7c7cff;
  --green:#22c55e;
  --text:#ffffff;
  --muted:#cbd5e1;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

body{
  margin:0;
  min-height:100vh;
  font-family:-apple-system,BlinkMacSystemFont,"Inter","Segoe UI",sans-serif;
  background:
    radial-gradient(1200px 600px at 10% -10%, #1b2a4a 0%, transparent 60%),
    radial-gradient(900px 500px at 110% 10%, #2a144a 0%, transparent 55%),
    linear-gradient(180deg, var(--bg-dark), var(--bg-mid));
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
  color:var(--text);
}

.wrapper{width:100%;max-width:430px}

.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  background:linear-gradient(120deg,transparent 20%,rgba(255,255,255,.25),transparent 80%);
  opacity:.15;
  pointer-events:none; /* <-- важно */
}

.card > *{
  position:relative;
  z-index:1; /* <-- важно */
}

.badge{
  display:inline-block;
  padding:8px 14px;
  border-radius:999px;
  font-size:.75rem;
  font-weight:700;
  letter-spacing:.04em;
  background:linear-gradient(135deg,var(--neon),var(--purple));
  color:#020617;
  margin-bottom:18px;
}

.title{
  font-size:1.55rem;
  font-weight:900;
  line-height:1.25;
  text-align:center;
  margin-bottom:14px;
}

.subtitle{
  text-align:center;
  font-size:1.05rem;
  font-weight:600;
  color:var(--muted);
  margin-bottom:26px;
}

.subtitle span{
  background:linear-gradient(90deg,var(--neon),var(--green));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  font-weight:800;
}

.list{display:grid;gap:14px;margin-bottom:26px}

.item{
  display:flex;
  align-items:center;
  gap:14px;
  padding:16px;
  border-radius:18px;
  background:linear-gradient(180deg,rgba(255,255,255,.10),rgba(255,255,255,.04));
  border:1px solid rgba(255,255,255,.08);
}

.icon{
  width:36px;
  height:36px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:linear-gradient(135deg,var(--neon),var(--purple));
  color:#020617;
  font-weight:900;
  flex-shrink:0;
}

.item-text{font-size:.95rem}

.money{
  font-weight:900;
  background:linear-gradient(90deg,var(--green),var(--neon));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.cta-text{text-align:center;font-weight:800;margin:18px 0 16px}

.telegram-btn{
  display:flex;
  justify-content:center;
  align-items:center;
  width:100%;
  padding:18px;
  border-radius:20px;
  text-decoration:none;
  font-weight:900;
  font-size:1.05rem;
  color:#020617;
  background:linear-gradient(135deg,var(--neon),var(--purple));
  box-shadow:0 18px 40px rgba(34,247,208,.35),inset 0 1px 0 rgba(255,255,255,.4);
  transition:.18s ease;
}

.telegram-btn:active{
  transform:scale(.97);
  box-shadow:0 10px 25px rgba(34,247,208,.25);
}
